<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Loan Application Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="card mx-auto" style="max-width:680px">
      <div class="card-body">
        <h3 class="card-title text-center mb-4">🏦 Loan Application Form</h3>

        <!-- Success message -->
        <div id="successMsg" class="alert alert-success text-center" style="display:none;">
          ✅ Submitted Successfully! Redirecting to dashboard...
        </div>

        <!-- Error message -->
        <div id="errorMsg" class="alert alert-danger text-center" style="display:none;">
          ❌ Error submitting form. Please try again.
        </div>

        <!-- Loan Form -->
        <form id="loanForm">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input class="form-control" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">CNIC</label>
            <input class="form-control" name="cnic" placeholder="12345-6789012-3" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Address</label>
            <input class="form-control" name="address" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Loan Amount (PKR)</label>
            <input class="form-control" type="number" step="0.01" name="amount" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Purpose</label>
            <input class="form-control" name="purpose" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contact</label>
            <input class="form-control" name="contact" placeholder="0300-1234567" required>
          </div>
          <button class="btn btn-primary w-100" type="submit" id="submitBtn">Submit Application</button>
        </form>

      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loanForm');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // Disable submit button and show loading
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const formData = new FormData(form);
        
        const response = await fetch('/', {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          // Show success message
          form.style.display = 'none';
          successMsg.style.display = 'block';
          
          // Redirect to dashboard after 2 seconds
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 2000);
        } else {
          throw new Error('Submission failed');
        }
      } catch (error) {
        // Show error message
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Application';
        
        // Hide error after 3 seconds
        setTimeout(() => {
          errorMsg.style.display = 'none';
        }, 3000);
      }
    });
  </script>
</body>
</html>
